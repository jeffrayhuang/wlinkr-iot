server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://HCMQVE0LSPBT001:5432/postgres?stringtype=unspecified
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_batch_fetch_size: 20
        default_schema: wlinkr

  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: wlinkr
    baselineOnMigrate: true

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=300s
    cache-names:
      - devices
      - device-detail
      - sensor-data
      - dashboard

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: openid, profile, email
          facebook:
            client-id: ${FACEBOOK_CLIENT_ID:your-facebook-client-id}
            client-secret: ${FACEBOOK_CLIENT_SECRET:your-facebook-client-secret}
            scope: email, public_profile
        provider:
          facebook:
            authorization-uri: https://www.facebook.com/v18.0/dialog/oauth
            token-uri: https://graph.facebook.com/v18.0/oauth/access_token
            user-info-uri: https://graph.facebook.com/v18.0/me?fields=id,name,email,picture

app:
  jwt:
    secret: ${JWT_SECRET:defaultDevSecretKeyThatMustBeAtLeast256BitsLongForHS256Algorithm}
    expiration-ms: 86400000          # 24 hours
  oauth2:
    authorized-redirect-uri: http://localhost:5173/oauth2/redirect

# MQTT Configuration
mqtt:
  embedded:
    enabled: ${MQTT_EMBEDDED_ENABLED:true}       # true = start embedded Moquette broker
    host: 0.0.0.0
    port: ${MQTT_EMBEDDED_PORT:1883}
    websocket-port: ${MQTT_EMBEDDED_WS_PORT:9883}
  broker:
    url: ${MQTT_BROKER_URL:tcp://localhost:1883}  # external broker URL (used when embedded=false)
    username: ${MQTT_USERNAME:}
    password: ${MQTT_PASSWORD:}
    client-id: ${MQTT_CLIENT_ID:wlinkr-server}
  topics:
    sensor-data: wlinkr/devices/+/telemetry      # devices publish sensor data here
    commands: wlinkr/devices/+/commands           # server publishes commands here
    status: wlinkr/devices/+/status               # device online/offline status
    command-response: wlinkr/devices/+/commands/response  # devices respond to commands here

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, caches
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    com.wlinkr: DEBUG
    org.springframework.security: DEBUG
