version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: wlinkr-postgres
    environment:
      POSTGRES_DB: wlinkr_iot
      POSTGRES_USER: wlinkr
      POSTGRES_PASSWORD: wlinkr_secret
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U wlinkr -d wlinkr_iot']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wlinkr-backend
    ports:
      - '8080:8080'
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/wlinkr_iot
      DB_USERNAME: wlinkr
      DB_PASSWORD: wlinkr_secret
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      FACEBOOK_CLIENT_ID: ${FACEBOOK_CLIENT_ID}
      FACEBOOK_CLIENT_SECRET: ${FACEBOOK_CLIENT_SECRET}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: wlinkr-frontend
    ports:
      - '5173:80'
    depends_on:
      - backend

volumes:
  pgdata:
